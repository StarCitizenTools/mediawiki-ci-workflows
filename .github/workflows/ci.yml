name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run yamlfmt
        run: go run github.com/google/yamlfmt/cmd/yamlfmt@latest -lint .
